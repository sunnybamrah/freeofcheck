name: Nightly openFDA schema drift check

# Hits the LIVE openFDA API to catch upstream shape changes that would break the
# ingredient matcher (spec §5.7). Runs daily; opens nothing automatically but
# fails loudly so the maintainer is alerted via the Actions run.
on:
  schedule:
    - cron: "17 6 * * *" # 06:17 UTC daily
  workflow_dispatch: {}

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check openFDA inactive_ingredient shape
        env:
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
        run: node scripts/check-schema.mjs
