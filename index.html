<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Light is the default; dark applies only when the user opts in. This inline
         script sets the saved theme before paint so dark users don't flash white. -->
    <script>
      try {
        if (localStorage.getItem("foc_theme") === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (e) {}
    </script>
    <meta name="theme-color" content="#F2F3F6" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="canonical" href="https://freeofcheck.com/" />

    <title>FreeOfCheck — Know what's NOT in your medicine | FDA-label ingredient check</title>
    <meta
      name="description"
      content="Free, no-login tool that checks whether an FDA drug label lists an ingredient you want to avoid — PEG, dyes, lactose, soy, or gluten. Every answer cites its exact FDA label passage. Nothing is stored."
    />
    <meta name="keywords" content="medication ingredient checker, excipient check, PEG allergy, dye-free medicine, lactose in medication, gluten in medicine, FDA inactive ingredients" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FreeOfCheck" />
    <meta property="og:title" content="FreeOfCheck — Know what's NOT in your medicine" />
    <meta property="og:description" content="Check an FDA drug label for an ingredient you want to avoid. Free, cited, nothing stored." />
    <meta property="og:url" content="https://freeofcheck.com/" />
    <meta property="og:image" content="https://freeofcheck.com/icons/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FreeOfCheck — Know what's NOT in your medicine" />
    <meta name="twitter:description" content="Check an FDA drug label for an ingredient you want to avoid. Free, cited, nothing stored." />
    <meta name="twitter:image" content="https://freeofcheck.com/icons/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
